name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run build:check

      - name: Format check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist/ build works
        run: |
          node dist/bin/grd-tools.js current-timestamp --raw
          echo "dist/ CLI: OK"

      - name: Test
        run: npm test

  validate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Pack and install validation
        run: |
          # Build dist/ first
          npm run build

          # Pack the tarball
          npm pack
          TARBALL=$(ls grd-tools-*.tgz)
          echo "Packed: $TARBALL"

          # Create a temp consumer project
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          npm init -y --silent
          npm install --ignore-scripts "$GITHUB_WORKSPACE/$TARBALL"

          # Verify dist/ build is functional in consumer context
          node node_modules/grd-tools/dist/bin/grd-tools.js current-timestamp --raw
          echo "grd-tools dist/ CLI: OK"

          # Verify MCP server starts and responds to initialize handshake
          MCP_RESPONSE=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0.0"}}}' | timeout 5 node node_modules/grd-tools/dist/bin/grd-mcp-server.js)
          echo "$MCP_RESPONSE" | grep -q '"protocolVersion"'
          echo "grd-mcp-server dist/: OK"

          # Verify plugin.json exists at expected path
          test -f node_modules/grd-tools/.claude-plugin/plugin.json
          echo "plugin.json: OK"

          # Clean up
          cd "$GITHUB_WORKSPACE"
          rm -rf "$INSTALL_DIR"
          rm -f "$TARBALL"

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
